name: Daily District Notice

on:
  schedule:
    # 매일 오후 6시 KST (= 09:00 UTC)
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-district-notice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run daily district notice
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
          ATTENDEE_EMAIL: ${{ secrets.ATTENDEE_EMAIL }}
        run: npm run start:district-notice
